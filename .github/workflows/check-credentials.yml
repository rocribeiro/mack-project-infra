###############################################################
# Workflow: Atualizar Credenciais AWS Academy
#
# O AWS Academy gera credenciais temporárias que expiram a cada 4h.
# Use esse workflow para atualizar os Secrets do GitHub com as
# credenciais novas antes de rodar o pipeline com Plan.
#
# Como usar:
#   1. No AWS Academy → AWS Details → AWS CLI → copie as 3 linhas
#   2. Vá em: GitHub → Settings → Secrets → Actions
#   3. Atualize: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN
#   4. Rode esse workflow para confirmar que as credenciais estão válidas
###############################################################

name: 🔑 Verificar Credenciais AWS Academy

on:
  workflow_dispatch:  # Só dispara manualmente

jobs:
  verificar-credenciais:
    name: Verificar se as credenciais estão válidas
    runs-on: ubuntu-latest

    steps:
      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Verificar identidade
        run: |
          echo "=== Identidade AWS ==="
          aws sts get-caller-identity

          echo ""
          echo "=== Buckets S3 do projeto ==="
          aws s3 ls | grep b3-datalake || echo "Nenhum bucket encontrado (infra ainda não aplicada)"

          echo ""
          echo "=== Lambdas do projeto ==="
          aws lambda list-functions \
            --query 'Functions[?starts_with(FunctionName, `b3-datalake`)].FunctionName' \
            --output table 2>/dev/null || echo "Nenhuma Lambda encontrada"

      - name: Resultado
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ Credenciais AWS Academy válidas

          As credenciais estão funcionando. Agora você pode:

          1. Rodar o pipeline `CI — Validação e Plan` com `workflow_dispatch`
          2. Ou aplicar diretamente no Cloud Shell:
          ```bash
          cd mack-project-infra && git pull && terraform apply -auto-approve
          ```

          > ⚠️ Lembre-se: as credenciais expiram em ~4h. Atualize os Secrets antes de usar novamente.
          EOF
